    jointProbabilityConfig:
      type: StatCovariance
    plotGeneratorConfig:
      canvasParameters:
        height: 800
        nbXplots: 1
        nbYplots: 1
        width: 1000
      histogramsDefinition:
      - rescaleAsBinWidth: false
        splitVars:
        - IsSignal
        useSampleBinning: true
        varToPlot: RecoMuonCos
        xTitle: cos(#theta_{#mu})
        yTitle: Slices
      - rescaleAsBinWidth: false
        splitVars:
        - IsSignal
        useSampleBinning: true
        varToPlot: RecoMuonProtonCos
        xTitle: cos(#theta_{#mu,p})
        yTitle: Slices
      varDictionnaries:
      - dictionary:
        - color: 805
          title: Cosmic
          value: 5
        - color: 866
          title: NuNC
          value: 4
        - color: 842
          title: NuCCOther
          value: 3
        - color: 800
          title: OOPS
          value: 2
        - color: 855
          title: signal
          value: 1
        name: IsSignal

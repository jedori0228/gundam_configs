        nominalWeightFormula: '( IsData ? (Run<9300 ? 1.26862061947009 : 0.984613145608233)
          : (2.500616E+20/1.0900766e+21) *  ( (IsSignal==5 ? 0.67937750173924 : FluxWeightWithBeamWidthCorrection
          * SPPQ2RW * SPPTpiMINERvAFittedReweight) * POTWeightedTriggerWeight ) )'
        tree: AllSamples_FillTree/selectedEvents_NSigmas

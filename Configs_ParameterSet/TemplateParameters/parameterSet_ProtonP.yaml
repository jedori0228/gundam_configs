name: Template Parameter ProtonP
isEnabled: true

printDialSetsSummary: true

nominalStepSize: 0.1
useOnlyOneParameterPerEvent: true

dialSetDefinitions:
  - name: Template Parameter ProtonP dialSetDefinitions
    dialType: "lnN"
    applyOnDataSets: ["*"]
    parametersBinningPath: "${GUNDAM_CONFIG_DIR}/binnings/binning_TrueProtonP.txt"
    applyCondition: "[IsSignal] == 1"
    printDialsSummary: true

